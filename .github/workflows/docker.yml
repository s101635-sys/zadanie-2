name: Build and Publish

on:
push:
branches:
- main

permissions:
contents: read
packages: write

jobs:
build:


runs-on: ubuntu-latest

steps:

  - uses: actions/checkout@v4

  - uses: docker/setup-qemu-action@v3

  - uses: docker/setup-buildx-action@v3

  - name: Login DockerHub
    uses: docker/login-action@v3
    with:
      username: ${{ secrets.DOCKERHUB_USERNAME }}
      password: ${{ secrets.DOCKERHUB_TOKEN }}

  - name: Login GHCR
    uses: docker/login-action@v3
    with:
      registry: ghcr.io
      username: ${{ github.actor }}
      password: ${{ secrets.GITHUB_TOKEN }}

  - name: Build image for scan
    uses: docker/build-push-action@v6
    with:
      context: .
      load: true
      tags: weather-app:test

  - name: Trivy scan
    uses: aquasecurity/trivy-action@0.28.0
    with:
      image-ref: weather-app:test
      severity: HIGH,CRITICAL
      exit-code: 1

  - name: Build and Push
    uses: docker/build-push-action@v6
    with:
      context: .
      push: true
      platforms: linux/amd64,linux/arm64

      tags: |
        ghcr.io/${{ github.repository_owner }}/weather-app:latest
        ghcr.io/${{ github.repository_owner }}/weather-app:${{ github.sha }}

      cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/weather-app-cache:buildcache
      cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/weather-app-cache:buildcache,mode=max
```
